name: Release Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and Attach Assets
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/hametuha/hanmoto-helper/releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 7.4
          tools: composer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Plugin
        run: bash bin/build.sh ${{ github.event.release.tag_name }}

      - name: Create Zip
        run: |
          mkdir ${{ github.event.repository.name }}
          rsync -av --exclude-from=.distignore --exclude=${{ github.event.repository.name }} ./ ./${{ github.event.repository.name }}/
          zip -r ${{ github.event.repository.name }}.zip ./${{ github.event.repository.name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
